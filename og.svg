<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#1a1713"/>
  <!-- Border -->
  <rect x="1" y="1" width="1198" height="628" fill="none" stroke="#3a3632" stroke-width="2"/>
  <!-- Logo -->
  <text x="80" y="220" font-family="'SF Mono', 'Cascadia Code', 'Consolas', monospace" font-size="88" font-weight="700" letter-spacing="-2" fill="#e0d8c8">link<tspan fill="#c8a84e">scrub</tspan></text>
  <!-- Tagline -->
  <text x="82" y="278" font-family="'SF Mono', 'Cascadia Code', 'Consolas', monospace" font-size="26" fill="#8f8577">strip tracking parameters from URLs — browser-side, no signup</text>
  <!-- Divider -->
  <line x1="80" y1="310" x2="1120" y2="310" stroke="#3a3632" stroke-width="1"/>
  <!-- Before/after URL example -->
  <rect x="80" y="330" width="1040" height="200" rx="6" fill="#211f1b" stroke="#3a3632" stroke-width="1"/>
  <!-- Before -->
  <text x="110" y="370" font-family="'SF Mono', 'Cascadia Code', 'Consolas', monospace" font-size="16" fill="#8f8577">before</text>
  <text x="110" y="396" font-family="'SF Mono', 'Cascadia Code', 'Consolas', monospace" font-size="17" fill="#e0d8c8">https://example.com/article</text><text x="579" y="396" font-family="'SF Mono', 'Cascadia Code', 'Consolas', monospace" font-size="17" fill="#c08080" text-decoration="line-through">?utm_source=newsletter&amp;fbclid=IwAR1x…</text>
  <!-- Divider -->
  <line x1="110" y1="415" x2="1090" y2="415" stroke="#2e2b26" stroke-width="1"/>
  <!-- After -->
  <text x="110" y="445" font-family="'SF Mono', 'Cascadia Code', 'Consolas', monospace" font-size="16" fill="#6a9e5f">after</text>
  <text x="110" y="471" font-family="'SF Mono', 'Cascadia Code', 'Consolas', monospace" font-size="17" fill="#e0d8c8">https://example.com/article</text>
  <!-- Removed tags -->
  <rect x="110" y="484" width="94" height="22" rx="3" fill="#2a1a1a" stroke="rgba(192,80,80,0.3)" stroke-width="1"/>
  <text x="118" y="500" font-family="'SF Mono', 'Cascadia Code', 'Consolas', monospace" font-size="13" fill="#c08080">utm_source</text>
  <rect x="214" y="484" width="70" height="22" rx="3" fill="#2a1a1a" stroke="rgba(192,80,80,0.3)" stroke-width="1"/>
  <text x="222" y="500" font-family="'SF Mono', 'Cascadia Code', 'Consolas', monospace" font-size="13" fill="#c08080">fbclid</text>
  <rect x="294" y="484" width="56" height="22" rx="3" fill="#2a1a1a" stroke="rgba(192,80,80,0.3)" stroke-width="1"/>
  <text x="302" y="500" font-family="'SF Mono', 'Cascadia Code', 'Consolas', monospace" font-size="13" fill="#c08080">gclid</text>
  <!-- URL -->
  <text x="80" y="610" font-family="'SF Mono', 'Cascadia Code', 'Consolas', monospace" font-size="20" fill="#3a3632">linkscrub.radicchio.page</text>
</svg>
